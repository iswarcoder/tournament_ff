<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel - H4X Esports</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    :root {
      --admin-bg: rgba(9, 14, 30, 0.92);
      --admin-border: rgba(77, 214, 255, 0.24);
      --admin-text: #e7efff;
      --admin-muted: #9fb2d9;
      --admin-glow: 0 18px 44px rgba(0, 0, 0, 0.45);
    }

    .topbar {
      width: min(1200px, calc(100% - 32px));
      margin: 18px auto 0;
      padding: 16px 20px;
      border-radius: 14px;
      position: sticky;
      top: 10px;
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(77, 214, 255, 0.22);
      background: rgba(8, 12, 24, 0.92);
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .brand-logo {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .brand h1 {
      margin: 0;
      font-size: 16px;
      line-height: 1.1;
      color: #e7efff;
    }

    .brand p {
      margin: 4px 0 0;
      font-size: 13px;
      color: #9fb2d9;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: #d8e5ff;
      text-decoration: none;
      font-weight: 600;
      padding: 6px 10px;
      border-radius: 8px;
    }

    .nav-links a:hover {
      background: rgba(77, 214, 255, 0.14);
      color: #7de5ff;
    }

    .admin-wrap {
      max-width: 1200px;
      margin: 28px auto 40px;
      padding: 0 16px;
      display: grid;
      gap: 16px;
    }

    .admin-table-wrap {
      overflow-x: auto;
      border-radius: 16px;
      border: 1px solid var(--admin-border);
      background: var(--admin-bg);
      backdrop-filter: blur(12px);
      box-shadow: var(--admin-glow);
    }

    .admin-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    .admin-table th,
    .admin-table td {
      padding: 14px 12px;
      text-align: left;
      border-bottom: 1px solid rgba(77, 214, 255, 0.12);
      color: var(--admin-text);
      font-size: 15px;
      vertical-align: middle;
    }

    .admin-table th {
      font-weight: 600;
      color: #9dc2ff;
      background: rgba(77, 214, 255, 0.06);
      font-size: 15px;
      letter-spacing: 0.02em;
    }

    .tag {
      display: inline-block;
      padding: 5px 11px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
    }

    .tag-pending { background: rgba(255, 183, 77, 0.2); color: #ffca73; }
    .tag-approved { background: rgba(114, 255, 172, 0.2); color: #72ffac; }
    .tag-rejected { background: rgba(255, 104, 127, 0.2); color: #ff8ea0; }

    .action-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mini-btn {
      border: 0;
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .mini-btn:hover {
      transform: translateY(-1px) scale(1.03);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
    }

    .mini-btn-approve { background: #1f9d5a; color: #fff; }
    .mini-btn-reject { background: #c53652; color: #fff; }

    .shot {
      width: 100px;
      height: 64px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .empty-row {
      text-align: center;
      color: #a8b6cf;
      padding: 20px;
    }

    .admin-auth {
      max-width: 500px;
      margin: 4px auto 24px;
      padding: 20px;
    }

    .admin-auth .form-grid {
      display: grid;
      gap: 12px;
    }

    .fixed-user {
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.06);
      color: #e7efff;
      font-weight: 600;
      font-size: 15px;
    }

    .admin-auth input {
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #fff;
      border-radius: 10px;
      padding: 12px 14px;
      outline: none;
      font-size: 15px;
    }

    .admin-auth input:focus,
    .admin-tools select:focus {
      border-color: rgba(77, 214, 255, 0.6);
      box-shadow: 0 0 0 3px rgba(77, 214, 255, 0.18);
    }

    .admin-top-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .admin-tools {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .admin-tools select {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #fff;
      border-radius: 8px;
      padding: 9px 11px;
      outline: none;
      font-size: 14px;
    }

    .section-title h3 {
      font-size: 30px;
      margin: 4px 0 0;
    }

    .section-title span,
    .muted-copy {
      font-size: 15px;
    }

    .btn {
      font-size: 14px;
      padding: 10px 14px;
    }

    .admin-loader {
      position: fixed;
      inset: 0;
      background: rgba(4, 8, 20, 0.72);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 70;
    }

    .admin-loader.active {
      display: flex;
    }

    .admin-loader-card {
      background: linear-gradient(145deg, rgba(11, 16, 34, 0.95), rgba(13, 9, 30, 0.95));
      border: 1px solid rgba(77, 214, 255, 0.32);
      border-radius: 16px;
      padding: 20px 24px;
      min-width: 240px;
      display: grid;
      justify-items: center;
      gap: 12px;
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.42);
    }

    .loader-ring-outer,
    .loader-ring-inner {
      display: block;
      border-radius: 50%;
      border: 3px solid transparent;
    }

    .loader-ring-outer {
      width: 44px;
      height: 44px;
      border-top-color: #4dd6ff;
      border-right-color: #8b6bff;
      animation: spinClock 1s linear infinite;
    }

    .loader-ring-inner {
      width: 26px;
      height: 26px;
      margin-top: -35px;
      border-bottom-color: #72ffac;
      border-left-color: #4dd6ff;
      animation: spinAnti 1.1s linear infinite;
    }

    .admin-loader-card p {
      margin: 0;
      color: #d8e5ff;
      font-weight: 600;
    }

    .admin-toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 80;
      min-width: 260px;
      max-width: 380px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(77, 214, 255, 0.36);
      background: rgba(9, 14, 30, 0.95);
      color: #e8f1ff;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.4);
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
      font-size: 14px;
      font-weight: 600;
    }

    .admin-toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .admin-toast.success {
      border-color: rgba(114, 255, 172, 0.65);
    }

    .admin-toast.error {
      border-color: rgba(255, 104, 127, 0.65);
    }

    .admin-toast.info {
      border-color: rgba(77, 214, 255, 0.65);
    }

    @keyframes spinClock {
      to { transform: rotate(360deg); }
    }

    @keyframes spinAnti {
      to { transform: rotate(-360deg); }
    }

    @media (max-width: 720px) {
      .topbar {
        padding: 12px;
      }

      .brand h1 {
        font-size: 14px;
      }

      .brand p {
        font-size: 12px;
      }

      .admin-top-actions {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <header class="topbar glass">
    <div class="brand">
      <div class="brand-mark brand-mark-logo">
        <img src="assets/logo.png" alt="H4X Esports logo" class="brand-logo" />
      </div>
      <div>
        <h1>H4X ESPORTS</h1>
        <p>Admin dashboard</p>
      </div>
    </div>
    <nav class="nav-links">
      <a href="index.html">Registration</a>
      <a href="support.html">Support</a>
    </nav>
  </header>

  <main class="admin-wrap">
    <section id="adminLoginSection" class="glass card admin-auth">
      <div class="section-title">
        <span>Admin Access</span>
        <h3>Login required</h3>
      </div>
      <form id="adminLoginForm" class="form-grid">
        <div class="fixed-user">Username: SWADHIN MANDAL</div>
        <input id="adminUsername" type="hidden" value="SWADHIN MANDAL" />
        <input id="adminPassword" type="password" placeholder="Enter admin password" required />
        <button id="adminLoginButton" type="submit" class="btn btn-primary btn-full">Login</button>
      </form>
      <p id="adminLoginMessage" class="muted-copy"></p>
    </section>

    <section id="adminPanelSection" class="glass card" style="display:none;">
      <div class="section-title">
        <span>Admin Panel</span>
        <h3>Approve and reject user payments</h3>
      </div>
      <div class="admin-top-actions">
        <div class="admin-tools">
          <label for="statusFilter" class="muted-copy">Status:</label>
          <select id="statusFilter">
            <option value="all">All</option>
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="rejected">Rejected</option>
          </select>
          <button id="adminRefreshButton" type="button" class="btn btn-secondary">Refresh</button>
        </div>
        <button id="adminLogoutButton" type="button" class="btn btn-secondary">Logout</button>
      </div>
      <p id="adminMessage" class="muted-copy">Loading users...</p>

      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>UID</th>
              <th>Status</th>
              <th>Slot</th>
              <th>Notification</th>
              <th>Screenshot</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="adminUsersBody">
            <tr><td class="empty-row" colspan="7">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="admin.js?v=login2"></script>

  <div id="adminLoader" class="admin-loader" aria-hidden="true">
    <div class="admin-loader-card">
      <span class="loader-ring-outer"></span>
      <span class="loader-ring-inner"></span>
      <p id="adminLoaderText">Loading admin dashboard...</p>
    </div>
  </div>

  <div id="adminToast" class="admin-toast" role="status" aria-live="polite"></div>
</body>
</html>
