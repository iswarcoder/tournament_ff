<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel - H4X Esports</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    .admin-wrap {
      max-width: 1200px;
      margin: 120px auto 40px;
      padding: 0 16px;
    }

    .admin-table-wrap {
      overflow-x: auto;
      border-radius: 16px;
      border: 1px solid rgba(77, 214, 255, 0.18);
      background: rgba(8, 12, 22, 0.9);
      backdrop-filter: blur(10px);
    }

    .admin-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    .admin-table th,
    .admin-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid rgba(77, 214, 255, 0.12);
      color: #e7efff;
      font-size: 14px;
      vertical-align: middle;
    }

    .admin-table th {
      font-weight: 600;
      color: #9dc2ff;
      background: rgba(77, 214, 255, 0.06);
    }

    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }

    .tag-pending { background: rgba(255, 183, 77, 0.2); color: #ffca73; }
    .tag-approved { background: rgba(114, 255, 172, 0.2); color: #72ffac; }
    .tag-rejected { background: rgba(255, 104, 127, 0.2); color: #ff8ea0; }

    .action-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mini-btn {
      border: 0;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .mini-btn-approve { background: #1f9d5a; color: #fff; }
    .mini-btn-reject { background: #c53652; color: #fff; }

    .shot {
      width: 90px;
      height: 60px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .empty-row {
      text-align: center;
      color: #a8b6cf;
      padding: 20px;
    }

    .admin-auth {
      max-width: 420px;
      margin: 0 auto 24px;
    }

    .admin-auth .form-grid {
      display: grid;
      gap: 10px;
    }

    .admin-auth input {
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #fff;
      border-radius: 10px;
      padding: 10px 12px;
      outline: none;
    }

    .admin-top-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .admin-tools {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .admin-tools select {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #fff;
      border-radius: 8px;
      padding: 8px 10px;
      outline: none;
    }
  </style>
</head>
<body>
  <header class="topbar glass">
    <div class="brand">
      <div class="brand-mark brand-mark-logo">
        <img src="assets/logo.png" alt="H4X Esports logo" class="brand-logo" />
      </div>
      <div>
        <h1>H4X ESPORTS</h1>
        <p>Admin dashboard</p>
      </div>
    </div>
    <nav class="nav-links">
      <a href="index.html">Registration</a>
      <a href="support.html">Support</a>
    </nav>
  </header>

  <main class="admin-wrap">
    <section id="adminLoginSection" class="glass card admin-auth">
      <div class="section-title">
        <span>Admin Access</span>
        <h3>Login required</h3>
      </div>
      <form id="adminLoginForm" class="form-grid">
        <input id="adminUsername" type="text" placeholder="Admin username" required />
        <input id="adminPassword" type="password" placeholder="Admin password" required />
        <button id="adminLoginButton" type="submit" class="btn btn-primary btn-full">Login</button>
      </form>
      <p id="adminLoginMessage" class="muted-copy"></p>
    </section>

    <section id="adminPanelSection" class="glass card" style="display:none;">
      <div class="section-title">
        <span>Admin Panel</span>
        <h3>Approve and reject user payments</h3>
      </div>
      <div class="admin-top-actions">
        <div class="admin-tools">
          <label for="statusFilter" class="muted-copy">Status:</label>
          <select id="statusFilter">
            <option value="all">All</option>
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="rejected">Rejected</option>
          </select>
          <button id="adminRefreshButton" type="button" class="btn btn-secondary">Refresh</button>
        </div>
        <button id="adminLogoutButton" type="button" class="btn btn-secondary">Logout</button>
      </div>
      <p id="adminMessage" class="muted-copy">Loading users...</p>

      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>UID</th>
              <th>Status</th>
              <th>Slot</th>
              <th>Notification</th>
              <th>Screenshot</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="adminUsersBody">
            <tr><td class="empty-row" colspan="7">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="admin.js?v=login2"></script>
</body>
</html>
